# GGCode 配置文件示例
# 复制此文件为 config.yaml 并根据需要修改

server:
  port: "8080"
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "60s"

database:
  host: "localhost"
  port: "3306"
  user: "root"
  password: ""
  name: "ggcode"
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: "1h"

jwt:
  secret: "your-secret-key-change-this-in-production"
  expiration: "24h"
  issuer: "ggcode"

judge:
  data_root: "/judge/data"
  workspace_root: "/tmp/ggcode_workspace"
  max_workers: 10
  default_time_limit: 5
  default_memory_limit: 128
  cleanup_interval: "1h"

security:
  rate_limit_requests: 100
  rate_limit_window: "1m"
  max_request_size: 10485760  # 10MB
  allowed_origins: ["*"]
  enable_cors: true

log:
  level: "info"
  format: "json"
  output: "stdout"
  max_size: 100
  max_backups: 10
  max_age: 7
  compress: true 