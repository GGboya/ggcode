definitions:
  models.CheckInStat:
    properties:
      best_streak:
        description: 历史最长连续天数
        type: integer
      checked_in_today:
        description: 今日是否已打卡
        type: boolean
      consecutive_days:
        description: 当前连续打卡天数
        type: integer
      total_check_in_days:
        description: 总打卡天数
        type: integer
    type: object
  services.HeatmapData:
    properties:
      count:
        description: 当天学习题目数量
        type: integer
      date:
        description: YYYY-MM-DD 格式
        type: string
      level:
        description: 活跃度级别 0-4
        type: integer
    type: object
  services.HeatmapResponse:
    properties:
      current_streak:
        description: 当前连续天数
        type: integer
      data:
        items:
          $ref: '#/definitions/services.HeatmapData'
        type: array
      max_streak:
        description: 最长连续天数
        type: integer
      this_year:
        description: 今年学习天数
        type: integer
      total_commits:
        description: 总学习天数
        type: integer
    type: object
info:
  contact: {}
paths:
  /api/checkin:
    post:
      description: 用户手动打卡，记录当天学习情况
      produces:
      - application/json
      responses:
        "200":
          description: 打卡成功
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 打卡失败
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 今日打卡
      tags:
      - 打卡
  /api/checkin-stats:
    get:
      description: 获取用户的打卡天数、连续天数等统计信息
      produces:
      - application/json
      responses:
        "200":
          description: 打卡统计信息
          schema:
            $ref: '#/definitions/models.CheckInStat'
        "500":
          description: 获取统计失败
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 获取打卡统计
      tags:
      - 打卡
  /api/login:
    post:
      consumes:
      - application/json
      description: 用户登录，返回 token
      parameters:
      - description: 登录参数
        in: body
        name: data
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 认证失败
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 用户登录
      tags:
      - 用户
  /api/logout:
    post:
      description: 清除登录状态
      produces:
      - application/json
      responses:
        "200":
          description: 登出成功
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 用户登出
      tags:
      - 用户
  /api/questionbanks:
    get:
      description: 分页获取题库列表，可按类型和排序方式筛选
      parameters:
      - description: 题库类型(official/shared/personal)
        in: query
        name: type
        type: string
      - description: 排序方式(star_count/fork_count/created_at)
        in: query
        name: sort
        type: string
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页数量
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 题库列表
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 获取失败
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 获取题库列表
      tags:
      - 题库
    post:
      consumes:
      - application/json
      description: 创建新的题库，可选导入题目
      parameters:
      - description: 题库信息
        in: body
        name: data
        required: true
        schema:
