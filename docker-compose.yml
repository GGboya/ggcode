version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ggcode-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ggcode123
      MYSQL_DATABASE: ggcode
      MYSQL_USER: ggcode
      MYSQL_PASSWORD: ggcode123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  ggcode:
    build: 
      context: .
      dockerfile: Dockerfile
      args:
        GOPROXY: https://goproxy.cn,direct
        GOSUMDB: sum.golang.google.cn
    container_name: ggcode-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # 数据库配置
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ggcode
      DB_PASSWORD: ggcode123
      DB_NAME: ggcode
      DB_MAX_OPEN_CONNS: 100
      DB_MAX_IDLE_CONNS: 10
      DB_CONN_MAX_LIFETIME: 1h
      
      # JWT配置
      JWT_SECRET: your-secret-key-change-this-in-production
      JWT_EXPIRATION: 24h
      JWT_ISSUER: ggcode
      
      # 服务器配置
      SERVER_PORT: 8080
      SERVER_READ_TIMEOUT: 30s
      SERVER_WRITE_TIMEOUT: 30s
      SERVER_IDLE_TIMEOUT: 60s
      
      # 评测系统配置
      JUDGE_DATA_ROOT: /judge/data
      JUDGE_WORKSPACE_ROOT: /tmp/ggcode_workspace
      JUDGE_MAX_WORKERS: 10
      JUDGE_DEFAULT_TIME_LIMIT: 5
      JUDGE_DEFAULT_MEMORY_LIMIT: 128
      JUDGE_CLEANUP_INTERVAL: 1h
      
      # 安全配置
      RATE_LIMIT_REQUESTS: 100
      RATE_LIMIT_WINDOW: 1m
      MAX_REQUEST_SIZE: 10485760
      ALLOWED_ORIGINS: "*"
      ENABLE_CORS: true
      
      # 日志配置
      LOG_LEVEL: info
      LOG_FORMAT: json
      LOG_OUTPUT: stdout
      LOG_MAX_SIZE: 100
      LOG_MAX_BACKUPS: 10
      LOG_MAX_AGE: 7
      LOG_COMPRESS: true
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./web:/root/web
      - judge_data:/judge/data
      - judge_workspace:/tmp/ggcode_workspace

volumes:
  mysql_data:
  judge_data:
  judge_workspace: 