version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: ggcode_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ggcode123
      MYSQL_DATABASE: ggcode
      MYSQL_USER: ggcode_user
      MYSQL_PASSWORD: ggcode123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./setup_mysql.sql:/docker-entrypoint-initdb.d/setup.sql
    networks:
      - ggcode_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # GGCode应用
  app:
    build: .
    container_name: ggcode_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ggcode_user
      DB_PASSWORD: ggcode123
      DB_NAME: ggcode
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      SERVER_PORT: 8080
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ggcode_network

volumes:
  mysql_data:

networks:
  ggcode_network:
    driver: bridge 