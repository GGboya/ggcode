{{template "base.html" .}}

{{define "interview-island-content"}}
<style>
    .island-container {
        position: relative;
        width: 100%;
        min-height: 80vh;
        height: auto;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 20px;
        overflow: visible;
        margin-bottom: 2rem;
        display: flex;
        flex-direction: column;
    }

    .island-map {
        position: relative;
        width: 100%;
        min-height: 400px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 50px;
    }

    .island-info {
        background: rgba(255, 255, 255, 0.9);
        padding: 20px;
        border-radius: 15px;
        backdrop-filter: blur(10px);
        min-width: 250px;
        margin: 20px;
        flex-shrink: 0;
    }

    .progress-summary {
        background: rgba(255, 255, 255, 0.9);
        padding: 20px;
        border-radius: 15px;
        backdrop-filter: blur(10px);
        min-width: 250px;
        margin: 20px;
        flex-shrink: 0;
    }

    .level-path {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 20px;
        max-width: 1200px;
        position: relative;
        padding: 40px 20px;
        min-height: 200px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 15px;
        margin: 20px 0;
    }

    .level-node {
        position: relative;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
        border: 4px solid;
        background: linear-gradient(135deg, #fff 0%, #f8f9fa 100%);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        z-index: 10;
        flex-shrink: 0;
    }

    .level-node.locked {
        background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
        border-color: #495057;
        cursor: not-allowed;
        opacity: 0.6;
    }

    .level-node.unlocked {
        background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        border-color: #20c997;
        animation: pulse 2s infinite;
    }

    .level-node.completed {
        background: linear-gradient(135deg, #007bff 0%, #6610f2 100%);
        border-color: #6610f2;
    }

    .level-node:hover:not(.locked) {
        transform: scale(1.1);
        box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
    }

    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(32, 201, 151, 0.7); }
        70% { box-shadow: 0 0 0 20px rgba(32, 201, 151, 0); }
        100% { box-shadow: 0 0 0 0 rgba(32, 201, 151, 0); }
    }

    .level-number {
        font-size: 24px;
        font-weight: bold;
        color: white;
        margin-bottom: 5px;
    }

    .level-stars {
        display: flex;
        gap: 2px;
    }

    .star {
        font-size: 16px;
        color: #ffc107;
    }

    .star.empty {
        color: #dee2e6;
    }

    .level-title {
        position: absolute;
        bottom: -35px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.9);
        padding: 5px 10px;
        border-radius: 10px;
        font-size: 12px;
        font-weight: bold;
        white-space: nowrap;
        backdrop-filter: blur(10px);
    }

    .connecting-line {
        position: absolute;
        height: 4px;
        background: linear-gradient(90deg, #28a745, #20c997);
        border-radius: 2px;
        z-index: -1;
    }

    .difficulty-badge {
        position: absolute;
        top: -10px;
        right: -10px;
        padding: 2px 6px;
        border-radius: 10px;
        font-size: 10px;
        font-weight: bold;
        color: white;
    }

    .difficulty-easy { background: #28a745; }
    .difficulty-medium { background: #ffc107; color: #000; }
    .difficulty-hard { background: #dc3545; }

    .island-selector {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin: 20px;
        flex-shrink: 0;
    }

    .island-tab {
        background: rgba(255, 255, 255, 0.9);
        border: none;
        padding: 10px 20px;
        border-radius: 25px;
        font-weight: bold;
        backdrop-filter: blur(10px);
        transition: all 0.3s ease;
    }

    .island-tab.active {
        background: rgba(255, 255, 255, 1);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .island-tab:hover {
        background: rgba(255, 255, 255, 1);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .loading-spinner {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 300px;
    }

    /* 新增：管理员控制按钮区域 */
    .admin-controls {
        position: absolute;
        top: 4px;
        right: 4px;
        display: flex;
        gap: 4px;
        visibility: hidden;
        z-index: 20;
    }
    .level-node:hover .admin-controls {
        visibility: visible;
    }
    .admin-controls .btn {
        --bs-btn-padding-y: 0.15rem;
        --bs-btn-padding-x: 0.25rem;
        --bs-btn-font-size: 0.65rem;
    }

    .world-map {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 40px;
        padding: 60px 20px;
        min-height: 400px;
    }
    .island-node {
        position: relative;
        width: 160px;
        height: 160px;
        border-radius: 50%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border: 4px solid #fff;
        background: linear-gradient(135deg, #17a2b8 0%, #6610f2 100%);
        color: #fff;
        cursor: pointer;
        transition: transform 0.3s;
    }
    .island-node.locked {
        background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
        cursor: not-allowed;
        opacity: 0.6;
    }
    .island-node:hover:not(.locked) {
        transform: scale(1.08);
    }

    /* 管理员岛屿控制按钮 */
    .island-admin-controls {
        position: absolute;
        top: 6px;
        right: 6px;
        display: flex;
        gap: 4px;
    }

    /* Style for search results in modal */
    .search-result-item {
        cursor: pointer;
        padding: 8px 12px;
    }
    .search-result-item:hover {
        background-color: #f0f0f0;
    }
</style>

<!-- 加载状态 -->
<div id="loading" class="loading-spinner">
    <div class="spinner-border text-primary mb-3" role="status">
        <span class="visually-hidden">加载中...</span>
    </div>
    <p class="text-muted">正在加载面试岛数据...</p>
</div>

<!-- 面试岛容器 -->
<div id="islandContainer" class="island-container" style="display: none;">
    <!-- 顶部工具栏 -->
    <div class="d-flex justify-content-between align-items-center p-3">
        <div>
            <button id="backToWorldBtn" class="btn btn-outline-light d-none" onclick="showWorldMap()">
                <i class="fas fa-arrow-left"></i> 返回地图
            </button>
        </div>
        <div>
            <!-- 仅管理员显示 -->
            <button id="createIslandBtn" class="btn btn-light d-none" onclick="createIsland()">
                <i class="fas fa-plus"></i> 新建岛屿
            </button>
        </div>
    </div>

    <!-- 世界地图视图：展示所有岛屿 -->
    <div id="worldMap" class="world-map">
        <!-- 岛屿节点由 JS 生成 -->
    </div>

    <!-- 岛屿详情视图（原有内容） -->
    <div id="islandDetail" style="display:none;" class="flex-grow-1 d-flex flex-column">
        <!-- 保留原有 info & progress -->
        <div class="d-flex justify-content-between align-items-start mb-4">
            <div class="island-info" id="detailInfo"></div>
            <div class="progress-summary" id="detailSummary"></div>
        </div>
        <!-- 地图区域 -->
        <div class="island-map flex-grow-1">
            <div id="levelPath" class="level-path"></div>
            <!-- 新增关卡按钮（仅管理员）-->
            <div id="addLevelContainer" class="mt-4" style="display: none;">
                <button class="btn btn-primary" onclick="openCreateLevelModal()">
                    <i class="fas fa-plus"></i> 新增关卡
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 新增：创建关卡模态框 -->
<div class="modal fade" id="createLevelModal" tabindex="-1" aria-labelledby="createLevelModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="createLevelModalLabel">新增关卡</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="createLevelForm">
                    <input type="hidden" id="islandIdInput">
                    <div class="mb-3">
                        <label for="levelNameInput" class="form-label">关卡名称</label>
                        <input type="text" class="form-control" id="levelNameInput" required>
                    </div>
                    <div class="mb-3">
                        <label for="levelDifficultySelect" class="form-label">关卡难度</label>
                        <select class="form-select" id="levelDifficultySelect" required>
                            <option value="Easy">Easy</option>
                            <option value="Medium">Medium</option>
                            <option value="Hard">Hard</option>
                        </select>
                    </div>
                    
                    <!-- 题目信息部分 -->
                    <div class="mb-3">
                        <label for="questionTitleInput" class="form-label">题目标题</label>
                        <input type="text" class="form-control" id="questionTitleInput" placeholder="如果不填写，将使用关卡名称作为题目标题">
                    </div>
                    <div class="mb-3">
                        <label for="questionDescriptionInput" class="form-label">题目描述</label>
                        <textarea class="form-control" id="questionDescriptionInput" rows="6" placeholder="请在此处描述题目要求和解题思路..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="questionLeetcodeInput" class="form-label">LeetCode链接（可选）</label>
                        <input type="url" class="form-control" id="questionLeetcodeInput" placeholder="https://leetcode.com/problems/...">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="createLevel()">创建关卡</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentIslandIndex = 0;
    let islandsData = [];
    // 是否管理员，后端需在接口返回或模板注入
    let isAdmin = true;

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', function() {
        loadIslandMap();
    });

    // 加载面试岛地图数据
    async function loadIslandMap() {
        try {
            console.log('开始加载面试岛数据...');
            const response = await axios.get('/api/interview-island/map');
            islandsData = response.data.data;
            // 从接口获取管理员标识和解锁岛屿数量
            if (typeof response.data.is_admin !== 'undefined') {
                isAdmin = !!response.data.is_admin;
            }
            if (typeof response.data.unlocked_island_count !== 'undefined') {
                unlockedIslandCount = response.data.unlocked_island_count;
            }
            console.log('是否管理员:', isAdmin);
            console.log('解锁岛屿数量:', unlockedIslandCount);
            console.log('面试岛数据加载成功:', islandsData);
            
            if (islandsData && islandsData.length > 0) {
                console.log('渲染面试岛界面...');
                renderIslandSelector();
                renderCurrentIsland();
                updateProgressSummary();
                console.log('面试岛界面渲染完成');
                renderWorldMap();
            } else {
                console.error('没有可用的面试岛数据');
                alert('没有可用的面试岛数据');
            }
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('islandContainer').style.display = 'block';
        } catch (error) {
            console.error('加载面试岛数据失败:', error);
            document.getElementById('loading').innerHTML = `
                <div class="alert alert-danger">
                    <h5>加载失败</h5>
                    <p>错误信息: ${error.message}</p>
                    <button class="btn btn-primary" onclick="loadIslandMap()">重新加载</button>
                </div>
            `;
        }
    }

    // 渲染岛屿选择器 (旧功能保留以兼容，但若不存在则忽略)
    function renderIslandSelector() {
        const selector = document.querySelector('.island-selector');
        if (!selector) return; // 若页面不存在该元素则跳过
        selector.innerHTML = '';

        islandsData.forEach((island, index) => {
            const tab = document.createElement('button');
            tab.className = `island-tab ${index === currentIslandIndex ? 'active' : ''}`;
            tab.innerHTML = `
                <i class="fas fa-island-tropical me-2"></i>
                ${island.island.name}
                <span class="badge bg-primary ms-2">${island.completed_count}/${island.total_count}</span>
            `;
            tab.onclick = () => switchIsland(index);
            selector.appendChild(tab);
        });
    }

    // 切换岛屿
    function switchIsland(index) {
        currentIslandIndex = index;
        renderIslandSelector();
        renderCurrentIsland();
    }

    // 渲染当前岛屿 (更新到新视图容器)
    function renderCurrentIsland() {
        if (!islandsData[currentIslandIndex]) return;
        const islandInfo = islandsData[currentIslandIndex];
        const island = islandInfo.island;

        // 更新 info 面板
        const infoEl = document.getElementById('detailInfo');
        if (infoEl) {
            infoEl.innerHTML = `
                <h5><i class="fas fa-island-tropical me-2"></i>${island.name}</h5>
                <p class="text-muted mb-3">${island.description || ''}</p>
                <div class="progress mb-2" style="height:8px;">
                    <div class="progress-bar" style="width:${islandInfo.total_count? (islandInfo.completed_count/islandInfo.total_count*100):0}%"></div>
                </div>
                <small class="text-muted">${islandInfo.completed_count}/${islandInfo.total_count} 关卡完成</small>`;
        }

        // 更新 summary 面板
        const summaryEl = document.getElementById('detailSummary');
        if (summaryEl) {
            summaryEl.innerHTML = `
                <h6 class="mb-3"><i class="fas fa-chart-line me-2"></i>总体进度</h6>
                <div class="row text-center">
                    <div class="col-6"><div class="h4 mb-1" id="totalStars">${islandInfo.total_stars}</div><small class="text-muted">总星数</small></div>
                    <div class="col-6"><div class="h4 mb-1" id="completedLevels">${islandInfo.completed_count}</div><small class="text-muted">完成关卡</small></div>
                </div>`;
        }

        // 渲染关卡路径使用原函数
        renderLevelPath(islandInfo.levels||[], islandInfo.user_progress||[]);
    }

    // 渲染关卡路径
    function renderLevelPath(levels, userProgress) {
        const pathContainer = document.getElementById('levelPath');
        console.log('开始渲染关卡路径，容器:', pathContainer);
        pathContainer.innerHTML = '';

        // 将用户进度转换为映射，便于查找
        const progressMap = {};
        if (userProgress && Array.isArray(userProgress)) {
            userProgress.forEach(progress => {
                progressMap[progress.level_id] = progress;
            });
        }
        console.log('进度映射:', progressMap);

        levels.forEach((level, index) => {
            const progress = progressMap[level.id] || { status: 'locked', stars: 0 };
            
            // 改进解锁逻辑：管理员可以看到所有关卡，第一个关卡自动解锁
            if (isAdmin) {
                if (progress.status === 'locked') {
                    progress.status = 'unlocked'; // 管理员可以看到所有关卡
                }
            } else if (index === 0 && progress.status === 'locked') {
                progress.status = 'unlocked'; // 第一个关卡自动解锁
            }
            
            console.log(`渲染关卡 ${level.level_num}:`, level, '进度:', progress);
            
            // 创建关卡节点
            const node = document.createElement('div');
            node.className = `level-node ${progress.status}`;
            
            // 新增：管理员控制按钮
            let adminHtml = '';
            if (isAdmin) {
                adminHtml = `
                    <div class="admin-controls">
                        <button class="btn btn-light edit-level-btn" title="编辑关卡" onclick="editLevel(${level.id}, '${level.name.replace(/'/g, "\\'")}')">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-light manage-questions-btn" title="题目管理" onclick="manageQuestions(${level.id})">
                            <i class="fas fa-list"></i>
                        </button>
                        <button class="btn btn-light manage-cases-btn" title="测试用例" onclick="manageTestCases(${level.id})">
                            <i class="fas fa-vial"></i>
                        </button>
                        <button class="btn btn-light delete-level-btn" title="删除关卡" onclick="deleteLevel(${level.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>`;
            }

            // 添加难度标识
            const difficultyClass = `difficulty-${level.difficulty.toLowerCase()}`;
            
            node.innerHTML = `
                ${adminHtml}
                <div class="level-number">${level.level_num}</div>
                <div class="level-stars">
                    ${generateStars(progress.stars || 0)}
                </div>
                <div class="level-title">${level.name}</div>
                <div class="difficulty-badge ${difficultyClass}">
                    ${level.difficulty}
                </div>
            `;

            // 保持原有点击逻辑
            if (progress.status !== 'locked') {
                node.style.cursor = 'pointer';
                node.onclick = (e) => {
                    // 避免点击管理员按钮导致进入关卡
                    if (e.target.closest('.admin-controls')) {
                        return;
                    }
                    enterLevel(level.id);
                };
            }

            console.log('添加关卡节点:', node);
            pathContainer.appendChild(node);

            // 添加连接线（除了最后一个节点）
            if (index < levels.length - 1) {
                const line = document.createElement('div');
                line.className = 'connecting-line';
                line.style.width = '80px';
                line.style.height = '4px';
                line.style.background = 'linear-gradient(90deg, #28a745, #20c997)';
                line.style.borderRadius = '2px';
                line.style.position = 'relative';
                line.style.margin = '0 20px';
                pathContainer.appendChild(line);
            }
        });
        
        console.log('关卡路径渲染完成，容器子元素数量:', pathContainer.children.length);

        // 控制新增关卡按钮的显示
        document.getElementById('addLevelContainer').style.display = isAdmin ? 'block' : 'none';
    }

    // 生成星级显示
    function generateStars(starCount) {
        let stars = '';
        for (let i = 0; i < 3; i++) {
            stars += `<i class="fas fa-star star ${i < starCount ? '' : 'empty'}"></i>`;
        }
        return stars;
    }

    // 更新总体进度
    function updateProgressSummary() {
        let totalStars = 0;
        let completedLevels = 0;

        islandsData.forEach(island => {
            totalStars += island.total_stars;
            completedLevels += island.completed_count;
        });

        document.getElementById('totalStars').textContent = totalStars;
        document.getElementById('completedLevels').textContent = completedLevels;
    }

    // 进入关卡
    function enterLevel(levelId) {
        window.location.href = `/level/${levelId}`;
    }

    /* ------------------ 管理员相关功能 ------------------ */
    let allQuestions = []; // 缓存所有问题
    let createLevelModal; // 模态框实例

    // 打开创建关卡模态框
    async function openCreateLevelModal() {
        if (!createLevelModal) {
            createLevelModal = new bootstrap.Modal(document.getElementById('createLevelModal'));
        }

        // 重置表单
        document.getElementById('createLevelForm').reset();
        
        // 设置岛屿ID
        const currentIslandId = islandsData[currentIslandIndex].island.id;
        document.getElementById('islandIdInput').value = currentIslandId;

        createLevelModal.show();
    }

    // 创建关卡
    async function createLevel() {
        const islandId = document.getElementById('islandIdInput').value;
        const name = document.getElementById('levelNameInput').value.trim();
        const difficulty = document.getElementById('levelDifficultySelect').value;
        const questionTitle = document.getElementById('questionTitleInput').value.trim();
        const questionDescription = document.getElementById('questionDescriptionInput').value.trim();
        const questionLeetcodeURL = document.getElementById('questionLeetcodeInput').value.trim();

        if (!name) {
            alert('请输入关卡名称');
            return;
        }

        try {
            const response = await axios.post('/api/interview-island/level/create', {
                island_id: parseInt(islandId),
                name: name,
                difficulty: difficulty,
                question_title: questionTitle || name + ' 题目',
                question_description: questionDescription || '请在此处编写代码解决问题',
                question_leetcode_url: questionLeetcodeURL
            });

            if (response.data) {
                alert('关卡创建成功！');
                createLevelModal.hide();
                // 重新加载数据
                await loadIslandMap();
                renderIslands();
            }
        } catch (error) {
            console.error('创建关卡失败:', error);
            const errorMsg = error.response?.data?.error || '创建关卡失败';
            alert('创建关卡失败: ' + errorMsg);
        }
    }

    // 编辑关卡名称
    async function editLevel(levelId, currentName) {
        const newName = prompt('请输入新的关卡名称：', currentName || '');
        if (!newName || newName === currentName) {
            return;
        }
        try {
            await axios.post(`/api/interview-island/level/${levelId}/edit`, { name: newName });
            showAlert('关卡名称已更新', 'success');
            // 更新前端视图
            loadIslandMap();
        } catch (error) {
            const msg = error.response?.data?.error || '更新失败';
            showAlert(msg, 'danger');
        }
    }

    // 删除关卡
    async function deleteLevel(levelId) {
        if (!confirm('确定要删除这个关卡吗？此操作不可撤销！')) {
            return;
        }
        try {
            await axios.delete(`/api/interview-island/level/${levelId}`);
            showAlert('关卡已删除', 'success');
            loadIslandMap();
        } catch (error) {
            const msg = error.response?.data?.error || '删除失败';
            showAlert(msg, 'danger');
        }
    }

    // 管理题目
    async function manageQuestions(levelId) {
        try {
            // 获取题目数据
            const res = await axios.get(`/api/interview-island/level/${levelId}/questions`);
            const questions = res.data.data || [];
            renderQuestionManagementModal(levelId, questions);
        } catch (err) {
            const msg = err.response?.data?.error || '加载题目失败';
            showAlert(msg, 'danger');
        }
    }

    // 渲染题目管理模态框
    function renderQuestionManagementModal(levelId, questions) {
        let modal = document.getElementById('questionManagementModal');
        if (!modal) {
            // 创建模态框骨架
            const modalHtml = `
            <div class="modal fade" id="questionManagementModal" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-lg">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">题目管理 - 关卡 ${levelId}</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <div class="d-flex justify-content-end mb-2">
                                <button class="btn btn-sm btn-primary" id="addQuestionBtn"><i class="fas fa-plus"></i> 新增题目</button>
                            </div>
                            <div id="questionListContainer"></div>
                        </div>
                    </div>
                </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            modal = document.getElementById('questionManagementModal');
        }

        const listContainer = modal.querySelector('#questionListContainer');
        if (questions.length === 0) {
            listContainer.innerHTML = '<p class="text-muted">暂无题目</p>';
        } else {
            listContainer.innerHTML = questions.map(q => `
                <div class="list-group-item d-flex justify-content-between align-items-center">
                    <div class="flex-grow-1">
                        <strong>${q.title}</strong>
                        <span class="badge ms-2 ${getDifficultyClass(q.difficulty)}">${q.difficulty}</span>
                    </div>
                    <div class="btn-group btn-group-sm">
                        <a href="${q.leetcode_url}" target="_blank" class="btn btn-outline-primary" title="打开 LeetCode"><i class="fas fa-external-link-alt"></i></a>
                        <button class="btn btn-outline-warning" onclick="editQuestion(${q.id}, '${q.title.replace(/'/g, "\\'")}', '${q.difficulty}', '${q.leetcode_url}')"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-outline-danger" onclick="deleteQuestion(${q.id}, ${levelId})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        // 绑定新增按钮
        modal.querySelector('#addQuestionBtn').onclick = () => addQuestion(levelId);

        const bsModal = new bootstrap.Modal(modal);
        bsModal.show();
    }

    // 工具：根据难度获取样式
    function getDifficultyClass(difficulty) {
        switch (difficulty?.toLowerCase()) {
            case 'easy': return 'bg-success';
            case 'medium': return 'bg-warning text-dark';
            case 'hard': return 'bg-danger';
            default: return 'bg-secondary';
        }
    }

    // 新增题目
    function addQuestion(levelId) {
        const title = prompt('题目标题：');
        if (!title) return;
        const leetcodeURL = prompt('LeetCode 链接：');
        const difficulty = prompt('难度（Easy/Medium/Hard）：', 'Easy');
        axios.post(`/api/interview-island/level/${levelId}/question/add`, { title, leetcode_url: leetcodeURL, difficulty })
            .then(() => {
                showAlert('题目已添加', 'success');
                manageQuestions(levelId); // 刷新列表
            })
            .catch(err => {
                const msg = err.response?.data?.error || '添加失败';
                showAlert(msg, 'danger');
            });
    }

    // 编辑题目
    async function editQuestion(questionId, currentTitle, currentDifficulty, currentURL) {
        // 先获取当前描述
        try {
            const response = await axios.get(`/api/questions/${questionId}`);
            const questionDetail = response.data;
            const currentDesc = questionDetail?.description || '';

            // 创建编辑模态框
            const modalHtml = `
            <div class="modal fade" id="editQuestionModal" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-lg">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">编辑题目</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <form id="editQuestionForm">
                                <div class="mb-3">
                                    <label for="editTitle" class="form-label">题目标题</label>
                                    <input type="text" class="form-control" id="editTitle" value="${currentTitle}" required>
                                </div>
                                <div class="mb-3">
                                    <label for="editURL" class="form-label">LeetCode链接</label>
                                    <input type="url" class="form-control" id="editURL" value="${currentURL || ''}" required>
                                </div>
                                <div class="mb-3">
                                    <label for="editDifficulty" class="form-label">难度</label>
                                    <select class="form-select" id="editDifficulty" required>
                                        <option value="Easy" ${currentDifficulty === 'Easy' ? 'selected' : ''}>简单</option>
                                        <option value="Medium" ${currentDifficulty === 'Medium' ? 'selected' : ''}>中等</option>
                                        <option value="Hard" ${currentDifficulty === 'Hard' ? 'selected' : ''}>困难</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label for="editDescription" class="form-label">题目描述</label>
                                    <textarea class="form-control" id="editDescription" rows="5" placeholder="支持Markdown格式">${currentDesc}</textarea>
                                </div>
                            </form>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                            <button type="button" class="btn btn-primary" onclick="submitEditQuestion(${questionId})">保存</button>
                        </div>
                    </div>
                </div>
            </div>`;
            
            // 移除已存在的模态框
            const existingModal = document.getElementById('editQuestionModal');
            if (existingModal) {
                existingModal.remove();
            }
            
            // 添加新模态框
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            
            // 显示模态框
            const modal = new bootstrap.Modal(document.getElementById('editQuestionModal'));
            modal.show();
            
            // 模态框关闭后移除DOM
            document.getElementById('editQuestionModal').addEventListener('hidden.bs.modal', function() {
                this.remove();
            });
            
        } catch (error) {
            console.error('获取题目详情失败:', error);
            showAlert('获取题目详情失败', 'danger');
        }
    }

    // 提交编辑题目
    async function submitEditQuestion(questionId) {
        const title = document.getElementById('editTitle').value;
        const leetcodeURL = document.getElementById('editURL').value;
        const difficulty = document.getElementById('editDifficulty').value;
        const description = document.getElementById('editDescription').value;

        if (!title || !difficulty) {
            showAlert('请填写题目标题和难度', 'warning');
            return;
        }

        try {
            await axios.put(`/api/questions/${questionId}`, { 
                title, 
                leetcode_url: leetcodeURL, 
                difficulty, 
                description 
            });
            showAlert('题目已更新', 'success');
            
            // 关闭模态框
            const modal = bootstrap.Modal.getInstance(document.getElementById('editQuestionModal'));
            if (modal) {
                modal.hide();
            }
            
            // 重新加载当前模态框中的数据
            const questionModal = bootstrap.Modal.getInstance(document.getElementById('questionManagementModal'));
            if (questionModal) {
                const levelId = questionModal._element.querySelector('.modal-title').textContent.match(/\d+/)[0];
                manageQuestions(levelId);
            }
        } catch (error) {
            const msg = error.response?.data?.error || '更新失败';
            showAlert(msg, 'danger');
        }
    }

    // 删除题目
    function deleteQuestion(questionId, levelId) {
        if (!confirm('确定要删除此题目吗？')) return;
        axios.post(`/api/interview-island/question/${questionId}/delete`)
            .then(() => {
                showAlert('题目已删除', 'success');
                manageQuestions(levelId);
            })
            .catch(err => {
                const msg = err.response?.data?.error || '删除失败';
                showAlert(msg, 'danger');
            });
    }

    // ------------------ 测试用例管理 ------------------
    async function manageTestCases(levelId) {
        try {
            const res = await axios.get(`/api/interview-island/level/${levelId}/testcases`);
            const cases = res.data.data || [];
            renderTestCaseModal(levelId, cases);
        } catch (err) {
            showAlert(err.response?.data?.error || '加载测试用例失败', 'danger');
        }
    }

    function renderTestCaseModal(levelId, cases) {
        let modal = document.getElementById('testCaseModal');
        if (!modal) {
            const html = `
            <div class="modal fade" id="testCaseModal" tabindex="-1" aria-hidden="true">
              <div class="modal-dialog modal-lg">
                <div class="modal-content">
                  <div class="modal-header">
                    <h5 class="modal-title">测试用例管理 - 关卡 ${levelId}</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                  </div>
                  <div class="modal-body">
                    <div class="d-flex justify-content-end mb-2">
                      <button class="btn btn-sm btn-primary" id="addCaseBtn"><i class="fas fa-plus"></i> 新增用例</button>
                    </div>
                    <div id="caseList"></div>
                  </div>
                </div>
              </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', html);
            modal = document.getElementById('testCaseModal');
        }
        const list = modal.querySelector('#caseList');
        list.innerHTML = cases.length === 0 ? '<p class="text-muted">暂无测试用例</p>' : cases.map(c=>`<div class="card mb-2">
            <div class="card-body p-2">
              <div class="d-flex justify-content-between">
                <span>#${c.order ?? 0} ${c.is_sample ? '<span class="badge bg-info">样例</span>':''}</span>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteTestCase(${c.id}, ${levelId})"><i class="fas fa-trash"></i></button>
              </div>
              <small class="text-muted">输入</small>
              <pre class="bg-light p-2">${c.input}</pre>
              <small class="text-muted">输出</small>
              <pre class="bg-light p-2">${c.output}</pre>
            </div>
        </div>`).join('');

        modal.querySelector('#addCaseBtn').onclick = ()=>addTestCase(levelId);
        new bootstrap.Modal(modal).show();
    }

    // 显示新增/编辑测试用例模态框
    function addTestCase(levelId) {
        let modal = document.getElementById('addCaseModal');
        if (!modal) {
            const html = `
            <div class="modal fade" id="addCaseModal" tabindex="-1" aria-hidden="true">
              <div class="modal-dialog">
                <div class="modal-content">
                  <div class="modal-header">
                    <h5 class="modal-title">新增测试用例</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                  </div>
                  <div class="modal-body">
                    <div class="mb-3">
                      <label class="form-label">输入数据 (Input)</label>
                      <textarea class="form-control" id="caseInput" rows="4" placeholder="支持多行"></textarea>
                    </div>
                    <div class="mb-3">
                      <label class="form-label">期望输出 (Output)</label>
                      <textarea class="form-control" id="caseOutput" rows="4" placeholder="支持多行"></textarea>
                    </div>
                    <div class="form-check form-switch mb-2">
                      <input class="form-check-input" type="checkbox" id="caseIsSample">
                      <label class="form-check-label" for="caseIsSample">设为样例</label>
                    </div>
                  </div>
                  <div class="modal-footer">
                    <button type="button" class="btn btn-primary" id="saveCaseBtn">保存</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                  </div>
                </div>
              </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', html);
            modal = document.getElementById('addCaseModal');
        }

        // 清空旧值
        modal.querySelector('#caseInput').value = '';
        modal.querySelector('#caseOutput').value = '';
        modal.querySelector('#caseIsSample').checked = false;

        // 绑定保存事件
        modal.querySelector('#saveCaseBtn').onclick = ()=>{
            const input = modal.querySelector('#caseInput').value.trim();
            const output = modal.querySelector('#caseOutput').value.trim();
            const isSample = modal.querySelector('#caseIsSample').checked;
            if(!input && !output){ showAlert('请输入内容','warning'); return; }
            axios.post(`/api/interview-island/level/${levelId}/testcases`, {input, output, is_sample: isSample, order: 0})
                .then(()=>{ showAlert('已添加用例','success'); bootstrap.Modal.getInstance(modal).hide(); manageTestCases(levelId); })
                .catch(err=>{ showAlert(err.response?.data?.error||'添加失败','danger'); });
        };

        new bootstrap.Modal(modal).show();
    }

    function deleteTestCase(id, levelId) {
        if(!confirm('确定删除此用例?')) return;
        axios.delete(`/api/interview-island/testcases/${id}`) // placeholder route, yet to implement
            .then(()=>{ showAlert('已删除','success'); manageTestCases(levelId); })
            .catch(err=>{ showAlert(err.response?.data?.error||'删除失败','danger'); });
    }

    // ------------- 新增：世界地图视图 ------------- //
    let unlockedIslandCount = 0; // 后端应提供

    function renderWorldMap() {
        const world = document.getElementById('worldMap');
        world.innerHTML = '';
        islandsData.forEach((islandInfo, index) => {
            const island = islandInfo.island;
            // 改进解锁逻辑：管理员可以看到所有岛屿，或根据解锁数量判断
            const locked = !isAdmin && index >= unlockedIslandCount;
            let adminHtml = '';
            if (isAdmin) {
                adminHtml = `
                    <div class="island-admin-controls">
                        <button class="btn btn-light btn-sm" title="编辑岛屿" onclick="editIsland(event, ${island.id}, '${island.name.replace(/'/g, "\\'")}')"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-light btn-sm" title="删除岛屿" onclick="deleteIsland(event, ${island.id})"><i class="fas fa-trash"></i></button>
                    </div>`;
            }
            const node = document.createElement('div');
            node.className = `island-node ${locked ? 'locked' : ''}`;
            node.innerHTML = `${adminHtml}<h4>${island.name}</h4><p>${island.description || ''}</p>`;
            if (!locked) {
                node.onclick = () => showIslandDetail(index);
            }
            world.appendChild(node);
        });
        // 管理按钮显隐
        document.getElementById('createIslandBtn').classList.toggle('d-none', !isAdmin);
        document.getElementById('backToWorldBtn').classList.add('d-none');
        document.getElementById('islandDetail').style.display = 'none';
        document.getElementById('worldMap').style.display = 'flex';
    }

    // 创建岛屿（管理员）
    function createIsland() {
        const name = prompt('岛屿名称：');
        if (!name) return;
        const description = prompt('描述：', '');
        axios.post('/api/interview-island/create', { name, description })
            .then(() => { showAlert('已创建岛屿', 'success'); loadIslandMap(); })
            .catch(err => { showAlert(err.response?.data?.error || '创建失败', 'danger'); });
    }

    function editIsland(event, islandId, currentName) {
        event.stopPropagation();
        const name = prompt('岛屿名称：', currentName);
        if (!name) return;
        const description = prompt('描述：');
        axios.post(`/api/interview-island/${islandId}/edit`, { name, description })
            .then(() => { showAlert('已更新岛屿', 'success'); loadIslandMap(); })
            .catch(err => { showAlert(err.response?.data?.error || '更新失败', 'danger'); });
    }

    function deleteIsland(event, islandId) {
        event.stopPropagation();
        if (!confirm('确定要删除该岛屿？')) return;
        axios.post(`/api/interview-island/${islandId}/delete`)
            .then(() => { showAlert('已删除岛屿', 'success'); loadIslandMap(); })
            .catch(err => { showAlert(err.response?.data?.error || '删除失败', 'danger'); });
    }
