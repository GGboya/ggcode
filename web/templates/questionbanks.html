{{template "base.html" .}}

{{define "content"}}
<div class="row">
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <i class="fas fa-book"></i> 题库管理
                <small class="text-muted">管理你的算法题库</small>
            </h2>
            <div class="d-flex gap-2">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createBankModal">
                    <i class="fas fa-plus"></i> 创建题库
                </button>
            </div>
        </div>

        <!-- 筛选和排序控件 -->
        <div class="row mb-4">
            <div class="col-md-8">
                <div class="btn-group" role="group" aria-label="题库类型筛选">
                    <input type="radio" class="btn-check" name="bankType" id="officialBanks" value="official" checked autocomplete="off">
                    <label class="btn btn-outline-primary" for="officialBanks">官方题库</label>

                    <input type="radio" class="btn-check" name="bankType" id="sharedBanks" value="shared" autocomplete="off">
                    <label class="btn btn-outline-primary" for="sharedBanks">共享题库</label>

                    <input type="radio" class="btn-check" name="bankType" id="personalBanks" value="personal" autocomplete="off">
                    <label class="btn btn-outline-primary" for="personalBanks">个人题库</label>

                    <input type="radio" class="btn-check" name="bankType" id="starredBanks" value="starred" autocomplete="off">
                    <label class="btn btn-outline-primary" for="starredBanks">
                        <i class="fas fa-star"></i> 已收藏
                    </label>
                </div>
            </div>
            <div class="col-md-4">
                <select class="form-select" id="sortBy">
                    <option value="created_at">按创建时间排序</option>
                    <option value="star_count">按收藏数排序</option>
                    <option value="fork_count">按Fork数排序</option>
                </select>
            </div>
        </div>
    </div>
</div>

<!-- 题库列表 -->
<div class="row" id="questionBanksList">
    <div class="col-12 text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">加载中...</span>
        </div>
        <p class="mt-2 text-muted">正在加载题库...</p>
    </div>
</div>

<!-- 创建题库模态框 -->
<div class="modal fade" id="createBankModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-plus"></i> 创建新题库
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="createBankForm">
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="bankName" class="form-label">题库名称</label>
                        <input type="text" class="form-control" id="bankName" required>
                    </div>
                    <div class="mb-3">
                        <label for="bankDescription" class="form-label">题库描述</label>
                        <textarea class="form-control" id="bankDescription" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> 创建
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 编辑题库模态框 -->
<div class="modal fade" id="editBankModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-edit"></i> 编辑题库
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="editBankForm">
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="editBankName" class="form-label">题库名称</label>
                        <input type="text" class="form-control" id="editBankName" required>
                    </div>
                    <div class="mb-3">
                        <label for="editBankDescription" class="form-label">题库描述</label>
                        <textarea class="form-control" id="editBankDescription" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> 保存
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 添加题目模态框 -->
<div class="modal fade" id="addQuestionModal" tabindex="-1" aria-labelledby="addQuestionModalLabel" aria-hidden="true" data-bs-backdrop="false" style="z-index: 1055;">
    <div class="modal-dialog" style="z-index: 1056;">
        <div class="modal-content" style="background: white; border-radius: 8px;">
            <div class="modal-header">
                <h5 class="modal-title" id="addQuestionModalLabel">
                    <i class="fas fa-plus"></i> 添加题目
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="addQuestionForm">
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="questionTitle" class="form-label">题目标题</label>
                        <input type="text" class="form-control" id="questionTitle" required>
                    </div>
                    <div class="mb-3">
                        <label for="questionURL" class="form-label">LeetCode链接</label>
                        <input type="url" class="form-control" id="questionURL" required>
                        <div class="form-text">请输入完整的LeetCode题目链接</div>
                    </div>
                    <div class="mb-3">
                        <label for="questionDifficulty" class="form-label">难度</label>
                        <select class="form-select" id="questionDifficulty" required>
                            <option value="">请选择难度</option>
                            <option value="Easy">简单</option>
                            <option value="Medium">中等</option>
                            <option value="Hard">困难</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> 添加
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 编辑题目模态框 -->
<div class="modal fade" id="editQuestionModal" tabindex="-1" data-bs-backdrop="false" style="z-index: 1065;">
    <div class="modal-dialog" style="z-index: 1066; margin-top: 20px;">
        <div class="modal-content" style="background: white; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-edit"></i> 编辑题目
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="editQuestionForm">
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="editQuestionTitle" class="form-label">题目标题</label>
                        <input type="text" class="form-control" id="editQuestionTitle" required>
                    </div>
                    <div class="mb-3">
                        <label for="editQuestionURL" class="form-label">LeetCode链接</label>
                        <input type="url" class="form-control" id="editQuestionURL" required>
                        <div class="form-text">请输入完整的LeetCode题目链接</div>
                    </div>
                    <div class="mb-3">
                        <label for="editQuestionDifficulty" class="form-label">难度</label>
                        <select class="form-select" id="editQuestionDifficulty" required>
                            <option value="">请选择难度</option>
                            <option value="Easy">简单</option>
                            <option value="Medium">中等</option>
                            <option value="Hard">困难</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> 保存
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 题库管理页面脚本 -->
<script>
let questionBanks = [];
let questionBanksProgress = [];
let currentBankId = null;

// 页面加载时获取数据
document.addEventListener('DOMContentLoaded', function() {
    console.log('Questionbanks DOM加载完成');
    
    // 检查Bootstrap是否正确加载
    if (typeof bootstrap === 'undefined') {
        console.error('Bootstrap 未正确加载');
        showAlert('页面加载异常，请刷新页面', 'danger');
        return;
    } else {
        console.log('Bootstrap 已正确加载');
    }
    
    // 检查模态框元素是否存在
    const addQuestionModal = document.getElementById('addQuestionModal');
    if (!addQuestionModal) {
        console.error('添加题目模态框元素不存在');
    } else {
        console.log('添加题目模态框元素存在');
        
        // 添加模态框事件监听器
        addQuestionModal.addEventListener('shown.bs.modal', function() {
            console.log('添加题目模态框已显示');
            
            // 聚焦到第一个输入框
            const firstInput = this.querySelector('input[type="text"]');
            if (firstInput) {
                setTimeout(() => firstInput.focus(), 100);
            }
        });
        
        addQuestionModal.addEventListener('hidden.bs.modal', function() {
            console.log('添加题目模态框已隐藏');
        });
        
        addQuestionModal.addEventListener('show.bs.modal', function() {
            console.log('添加题目模态框正在显示');
        });
        
        addQuestionModal.addEventListener('hide.bs.modal', function() {
            console.log('添加题目模态框正在隐藏');
        });
    }
    
    // 添加全局backdrop清理功能
    const clearBackdrops = () => {
        const backdrops = document.querySelectorAll('.modal-backdrop');
        backdrops.forEach(backdrop => {
            console.log('移除backdrop:', backdrop);
            backdrop.remove();
        });
        
        // 移除body上的modal-open类
        document.body.classList.remove('modal-open');
        document.body.style.overflow = '';
        document.body.style.paddingRight = '';
    };
    
    // 定期清理backdrop
    setInterval(clearBackdrops, 1000);
    
    // 页面点击时也清理
    document.addEventListener('click', (e) => {
        // 如果点击的不是模态框内容，清理backdrop
        if (!e.target.closest('.modal-content')) {
            setTimeout(clearBackdrops, 100);
        }
    });
    
    // 等待一小段时间让base.html的setupAxios完成，然后加载数据
    setTimeout(() => {
        console.log('开始加载Questionbanks数据');
        loadQuestionBanks();
        loadQuestionBanksProgress();
    }, 200);
});

// 关闭编辑题目模态框的函数
function closeEditQuestionModal() {
    const editModalElement = document.getElementById('editQuestionModal');
    const questionsModal = document.getElementById('questionsModal');
    const editModalInstance = bootstrap.Modal.getInstance(editModalElement);
    
    if (editModalInstance) {
        editModalInstance.hide();
    }
    
    // 重置模态框样式
    setTimeout(() => {
        editModalElement.classList.remove('on-top-layer');
        console.log('编辑模态框已关闭并重置样式');
    }, 150);
}

// 加载题库学习进度
async function loadQuestionBanksProgress() {
    try {
        const response = await axios.get('/api/questionbanks-progress');
        questionBanksProgress = response.data;
        renderQuestionBanks(); // 重新渲染以显示进度
    } catch (error) {
        console.error('加载学习进度失败:', error);
        // 如果进度加载失败，不影响题库列表的显示
    }
}

// 渲染题库列表
function renderQuestionBanks() {
    const container = document.getElementById('questionBanksList');
    
    if (questionBanks.length === 0) {
        container.innerHTML = `
            <div class="col-12 text-center py-5">
                <i class="fas fa-book fa-3x text-muted mb-3"></i>
                <h5>暂无题库</h5>
                <p class="text-muted">创建你的第一个题库开始学习</p>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createBankModal">
                    <i class="fas fa-plus"></i> 创建题库
                </button>
            </div>
        `;
        return;
    }
    
    let html = '';
    questionBanks.forEach(bank => {
        const isOfficial = bank.is_official;
        const currentUserId = getCurrentUserId();
        const isOwnBank = bank.created_by && bank.created_by === currentUserId;
        const badgeClass = isOfficial ? 'bg-success' : 'bg-primary';
        const badgeText = isOfficial ? '官方' : '自定义';
        
        // 查找该题库的学习进度
        const progress = questionBanksProgress.find(p => p.question_bank_id === bank.id);
        
        html += `
            <div class="col-md-6 col-lg-4 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <h5 class="card-title mb-0">
                                ${bank.name}
                                ${bank.forked_from ? '<i class="fas fa-code-branch text-muted ms-1" title="Fork来源"></i>' : ''}
                            </h5>
                            <div class="d-flex align-items-center gap-2">
                                <span class="badge ${badgeClass}">${badgeText}</span>
                                ${bank.is_shared ? '<span class="badge bg-info">共享</span>' : ''}
                            </div>
                        </div>
                        <p class="card-text text-muted">${bank.description || '暂无描述'}</p>
                        
                        <!-- Fork来源信息 -->
                        ${bank.original_bank ? `
                            <div class="alert alert-info py-1 px-2 mb-3">
                                <small><i class="fas fa-code-branch"></i> Fork自: ${bank.original_bank.name}</small>
                            </div>
                        ` : ''}
                        
                        <!-- Star和Fork统计 -->
                        ${(bank.is_shared || bank.is_official) ? `
                            <div class="row text-center mb-3">
                                <div class="col-6">
                                    <small class="text-muted">收藏</small>
                                    <div class="fw-bold text-warning">
                                        <i class="fas fa-star"></i> ${bank.star_count || 0}
                                    </div>
                                </div>
                                <div class="col-6">
                                    <small class="text-muted">Fork</small>
                                    <div class="fw-bold text-info">
                                        <i class="fas fa-code-branch"></i> ${bank.fork_count || 0}
                                    </div>
                                </div>
                            </div>
                        ` : ''}
                        
                        ${progress ? `
                            <!-- 学习进度部分 -->
                            <div class="mb-3">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <small class="text-muted">学习进度</small>
                                    <small class="text-primary fw-bold">${progress.progress_rate}%</small>
                                </div>
                                <div class="progress mb-2" style="height: 6px;">
                                    <div class="progress-bar bg-primary" style="width: ${progress.progress_rate}%"></div>
                                </div>
                                
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <small class="text-muted">掌握进度</small>
                                    <small class="text-success fw-bold">${progress.mastery_rate}%</small>
                                </div>
                                <div class="progress mb-3" style="height: 6px;">
                                    <div class="progress-bar bg-success" style="width: ${progress.mastery_rate}%"></div>
                                </div>
                                
                                <div class="row text-center small">
                                    <div class="col-6">
                                        <div class="text-muted">已学习</div>
                                        <div class="fw-bold text-primary">${progress.studied_count}/${progress.total_questions}</div>
                                    </div>
                                    <div class="col-6">
                                        <div class="text-muted">已掌握</div>
                                        <div class="fw-bold text-success">${progress.completed_count}/${progress.total_questions}</div>
                                    </div>
                                </div>
                                
                                ${progress.review_count > 0 ? `
                                    <div class="alert alert-warning py-2 px-3 mt-2 mb-0">
                                        <small><i class="fas fa-clock"></i> 待复习: ${progress.review_count} 题</small>
                                    </div>
                                ` : ''}
                            </div>
                        ` : `
                            <div class="mb-3">
                                <small class="text-muted"><i class="fas fa-info-circle"></i> 尚未开始学习</small>
                            </div>
                        `}
                        
                        <div class="d-flex justify-content-between align-items-center">
                            <small class="text-muted">
                                <i class="fas fa-user"></i> ${bank.creator ? bank.creator.username : '系统'}
                            </small>
                            <div class="btn-group btn-group-sm">
                                <button class="btn btn-outline-primary" onclick="viewQuestions(${bank.id})">
                                    <i class="fas fa-eye"></i> 查看
                                </button>
                                
                                <!-- 个人题库操作 -->
                                ${isOwnBank && !isOfficial ? `
                                    <button class="btn btn-outline-success" onclick="addQuestion(${bank.id})">
                                        <i class="fas fa-plus"></i> 添加题目
                                    </button>
                                    <button class="btn btn-outline-warning" onclick="editQuestionBank(${bank.id})">
                                        <i class="fas fa-edit"></i> 编辑
                                    </button>
                                    ${bank.is_shared ? `
                                        <button class="btn btn-outline-secondary" onclick="unshareQuestionBank(${bank.id})">
                                            <i class="fas fa-lock"></i> 取消共享
                                        </button>
                                    ` : `
                                        <button class="btn btn-outline-info" onclick="shareQuestionBank(${bank.id})">
                                            <i class="fas fa-share"></i> 共享
                                        </button>
                                    `}
                                    <button class="btn btn-outline-danger" onclick="deleteQuestionBank(${bank.id})">
                                        <i class="fas fa-trash"></i> 删除
                                    </button>
                                ` : ''}
                                
                                <!-- 共享题库操作（针对非自己的题库） -->
                                ${(bank.is_shared || bank.is_official) && !isOwnBank ? `
                                    <button class="btn btn-outline-warning" onclick="toggleStarQuestionBank(${bank.id})" id="starBtn${bank.id}">
                                        <i class="fas fa-star"></i> <span id="starText${bank.id}">收藏</span>
                                    </button>
                                    <button class="btn btn-outline-info" onclick="forkQuestionBank(${bank.id})">
                                        <i class="fas fa-code-branch"></i> Fork
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
    
    // 初始化收藏按钮状态
    initializeStarButtons();
}

// 初始化收藏按钮状态
async function initializeStarButtons() {
    try {
        const response = await axios.get('/api/starred-questionbanks');
        const starredBanks = response.data;
        const starredBankIds = starredBanks.map(bank => bank.id);
        
        // 更新所有收藏按钮的状态
        starredBankIds.forEach(bankId => {
            const starBtn = document.getElementById(`starBtn${bankId}`);
            const starText = document.getElementById(`starText${bankId}`);
            if (starBtn && starText) {
                starText.textContent = '已收藏';
                starBtn.classList.remove('btn-outline-warning');
                starBtn.classList.add('btn-warning');
            }
        });
    } catch (error) {
        console.log('初始化收藏状态失败:', error);
    }
}

// 查看题目
async function viewQuestions(bankId) {
    try {
        // 记录当前查看的题库ID，用于删除题目后刷新
        window.currentViewingBankId = bankId;
        
        const response = await axios.get(`/api/questionbanks/${bankId}/questions`);
        const questions = response.data;
        
        const bank = questionBanks.find(b => b.id === bankId);
        
        // 创建题目列表模态框
        const modalHtml = `
            <div class="modal fade" id="questionsModal" tabindex="-1">
                <div class="modal-dialog modal-lg">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">
                                <i class="fas fa-list"></i> ${bank.name} - 题目列表
                            </h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            ${questions.length === 0 ? `
                                <div class="text-center py-4">
                                    <i class="fas fa-inbox fa-3x text-muted mb-3"></i>
                                    <h6>暂无题目</h6>
                                    <p class="text-muted">该题库还没有题目</p>
                                </div>
                            ` : `
                                <div class="list-group">
                                    ${questions.map((q, index) => `
                                        <div class="list-group-item">
                                            <div class="d-flex justify-content-between align-items-start">
                                                <div class="flex-grow-1">
                                                    <h6 class="mb-1">${index + 1}. ${q.title}</h6>
                                                    <span class="badge ${getDifficultyClass(q.difficulty)}">${q.difficulty}</span>
                                                </div>
                                                <div class="btn-group btn-group-sm">
                                                    <a href="${q.leetcode_url}" target="_blank" class="btn btn-outline-primary">
                                                        <i class="fas fa-external-link-alt"></i> 做题
                                                    </a>
                                                    ${canEditBank(bank) ? `
                                                        <button class="btn btn-outline-warning" onclick="editQuestion(${q.id})">
                                                            <i class="fas fa-edit"></i> 编辑
                                                        </button>
                                                        <button class="btn btn-outline-danger" onclick="deleteQuestion(${q.id})">
                                                            <i class="fas fa-trash"></i> 删除
                                                        </button>
                                                    ` : ''}
                                                </div>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            `}
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        // 移除已存在的模态框
        const existingModal = document.getElementById('questionsModal');
        if (existingModal) {
            existingModal.remove();
        }
        
        // 添加新模态框
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        
        // 显示模态框
        const modal = new bootstrap.Modal(document.getElementById('questionsModal'));
        modal.show();
        
        // 模态框关闭后移除DOM
        document.getElementById('questionsModal').addEventListener('hidden.bs.modal', function() {
            this.remove();
        });
        
    } catch (error) {
        console.error('加载题目失败:', error);
        showAlert('加载题目失败', 'danger');
    }
}

// 添加题目
function addQuestion(bankId) {
    console.log('开始添加题目，bankId:', bankId);
    currentBankId = bankId;
    
    // 确保表单是空的
    document.getElementById('addQuestionForm').reset();

    }

    modalElement.classList.remove('show');

    const existingBackdrop = document.querySelector('.modal-backdrop');
    if (existingBackdrop) {

    setTimeout(() => {

                focus: true
            });

            const allBackdrops = document.querySelectorAll('.modal-backdrop');
            allBackdrops.forEach(backdrop => backdrop.remove());

            const handleEscape = (e) => {

                    modal.hide();

        } catch (error) {
            console.error('模态框显示失败:', error);
            showAlert('无法显示添加题目窗口', 'danger');
        }
    }, 50);
}

// 动态添加题目到模态框列表
function addQuestionToModal(newQuestion, modal) {
    const modalBody = modal.querySelector('.modal-body');
    let listGroup = modal.querySelector('.list-group');
    
    // 如果当前显示的是空状态，先清除它
    if (!listGroup) {
        const emptyState = modalBody.querySelector('.text-center');
        if (emptyState) {
            emptyState.remove();
        }
        // 创建新的列表容器
        modalBody.innerHTML = '<div class="list-group"></div>';
        listGroup = modal.querySelector('.list-group');
    }
    
    // 计算新题目的编号
    const existingItems = listGroup.querySelectorAll('.list-group-item');
    const newIndex = existingItems.length + 1;
    
    // 获取当前题库信息来判断是否可编辑
    const bank = questionBanks.find(b => b.id === currentBankId);
    const canEdit = bank && canEditBank(bank);
    
    // 创建新题目的HTML
    const newQuestionHtml = `
        <div class="list-group-item" style="opacity: 0;">
            <div class="d-flex justify-content-between align-items-start">
                <div class="flex-grow-1">
                    <h6 class="mb-1">${newIndex}. ${newQuestion.title}</h6>
                    <span class="badge ${getDifficultyClass(newQuestion.difficulty)}">${newQuestion.difficulty}</span>
                </div>
                <div class="btn-group btn-group-sm">
                    <a href="${newQuestion.leetcode_url}" target="_blank" class="btn btn-outline-primary">
                        <i class="fas fa-external-link-alt"></i> 做题
                    </a>
                    ${canEdit ? `
                        <button class="btn btn-outline-warning" onclick="editQuestion(${newQuestion.id})">
                            <i class="fas fa-edit"></i> 编辑
                        </button>
                        <button class="btn btn-outline-danger" onclick="deleteQuestion(${newQuestion.id})">
                            <i class="fas fa-trash"></i> 删除
                        </button>
                    ` : ''}
                </div>
            </div>
        </div>
    `;
    
    // 添加到列表末尾
    listGroup.insertAdjacentHTML('beforeend', newQuestionHtml);
    
    // 获取新添加的元素并添加淡入动画
    const newElement = listGroup.lastElementChild;
    newElement.style.transition = 'opacity 0.3s ease-in';
    setTimeout(() => {
        newElement.style.opacity = '1';
    }, 50);
}

function editQuestion(questionId) {

    const allQuestions = [];
    questionBanks.forEach(bank => {
        if (bank.questions) {
            allQuestions.push(...bank.questions);
        }
    });
    
    // 由于题目详情可能不在当前数据中，我们需要通过API获取
    fetchQuestionDetails(questionId);

// 获取题目详情
async function fetchQuestionDetails(questionId) {
    try {
        // 这里我们需要先找到题目所属的题库，然后获取题目列表
        let question = null;
        for (const bank of questionBanks) {
            try {
                const response = await axios.get(`/api/questionbanks/${bank.id}/questions`);
                const questions = response.data;
                question = questions.find(q => q.id === questionId);
                if (question) break;
            } catch (error) {
                continue;
            }
        }
        
        if (!question) {
            showAlert('题目不存在', 'danger');
            return;
        }
        
        // 填充编辑表单
        document.getElementById('editQuestionTitle').value = question.title;
        document.getElementById('editQuestionURL').value = question.leetcode_url;
        document.getElementById('editQuestionDifficulty').value = question.difficulty;
        
        // 保存当前编辑的题目ID
        window.currentQuestionId = questionId;
        
        // 显示编辑模态框，设置为无backdrop以避免与题目列表模态框冲突
        const modalElement = document.getElementById('editQuestionModal');
        
        // 清理可能存在的backdrop
        const existingBackdrops = document.querySelectorAll('.modal-backdrop');
        existingBackdrops.forEach(backdrop => backdrop.remove());
        
        // 创建模态框实例并显示
        const modal = new bootstrap.Modal(modalElement, {
            backdrop: false,
            keyboard: true,
            focus: true
        });
        
        modal.show();
        
        // 将编辑模态框置于最顶层
        setTimeout(() => {
            const questionsModal = document.getElementById('questionsModal');
            if (questionsModal && questionsModal.classList.contains('show')) {
                // 添加最顶层样式
                modalElement.classList.add('on-top-layer');
                console.log('编辑模态框已置于最顶层');
            }
        }, 100);
        
    } catch (error) {
        console.error('获取题目详情失败:', error);
        showAlert('获取题目详情失败', 'danger');
    }
}

// 更新模态框中的题目信息
function updateQuestionInModal(updatedQuestion) {
    const questionsModal = document.getElementById('questionsModal');
    if (questionsModal && questionsModal.classList.contains('show')) {
        const questionItems = questionsModal.querySelectorAll('.list-group-item');
        questionItems.forEach(item => {
            const editBtn = item.querySelector(`button[onclick*="editQuestion(${updatedQuestion.id})"]`);
            if (editBtn) {
                // 找到题目标题和难度标签元素
                const titleElement = item.querySelector('h6');
                const difficultyElement = item.querySelector('.badge');
                const linkElement = item.querySelector('a[target="_blank"]');
                
                if (titleElement && difficultyElement && linkElement) {
                    // 保持原有的编号
                    const titleText = titleElement.textContent;
                    const numberPart = titleText.match(/^\d+\.\s*/);
                    const newTitleText = numberPart ? numberPart[0] + updatedQuestion.title : updatedQuestion.title;
                    
                    // 更新内容
                    titleElement.textContent = newTitleText;
                    difficultyElement.className = `badge ${getDifficultyClass(updatedQuestion.difficulty)}`;
                    difficultyElement.textContent = updatedQuestion.difficulty;
                    linkElement.href = updatedQuestion.leetcode_url;
                    
                    // 添加更新动画效果
                    item.style.transition = 'background-color 0.3s ease';
                    item.style.backgroundColor = '#e3f2fd';
                    setTimeout(() => {
                        item.style.backgroundColor = '';
                    }, 1000);
                }
            }
        });
    }
}

// 确认删除题目
async function deleteQuestionConfirmed(questionId) {
    try {
        await axios.delete(`/api/questions/${questionId}`);
        
        showAlert('题目删除成功！', 'success');
        
        // 无感删除：直接从DOM中移除对应的题目元素
        const questionsModal = document.getElementById('questionsModal');
        if (questionsModal) {
            // 找到包含该题目的列表项并移除
            const questionItems = questionsModal.querySelectorAll('.list-group-item');
            questionItems.forEach(item => {
                const deleteBtn = item.querySelector(`button[onclick*="deleteQuestion(${questionId})"]`);
                if (deleteBtn) {
                    // 添加淡出动画效果
                    item.style.transition = 'opacity 0.3s ease-out';
                    item.style.opacity = '0';
                    
                    // 动画完成后移除元素
                    setTimeout(() => {
                        item.remove();
                        
                        // 检查是否还有题目，如果没有显示空状态
                        const remainingItems = questionsModal.querySelectorAll('.list-group-item');
                        if (remainingItems.length === 0) {
                            const modalBody = questionsModal.querySelector('.modal-body');
                            modalBody.innerHTML = `
                                <div class="text-center py-4">
                                    <i class="fas fa-inbox fa-3x text-muted mb-3"></i>
                                    <h6>暂无题目</h6>
                                    <p class="text-muted">该题库还没有题目</p>
                                </div>
                            `;
                        } else {
                            // 重新编号剩余题目
                            renumberQuestions(questionsModal);
                        }
                    }, 300);
                }
            });
        }
        
    } catch (error) {
        const message = error.response?.data?.error || '删除失败';
        showAlert(message, 'danger');
    }
}

// 重新编号题目列表
function renumberQuestions(modal) {
    const questionItems = modal.querySelectorAll('.list-group-item');
    questionItems.forEach((item, index) => {
        const titleElement = item.querySelector('h6');
        if (titleElement) {
            const titleText = titleElement.textContent;
            // 替换开头的数字编号
            const newTitle = titleText.replace(/^\d+\./, `${index + 1}.`);
            titleElement.textContent = newTitle;
        }
    });
}

// 获取当前用户ID (从JWT token中解析或从全局变量获取)
function getCurrentUserId() {
    if (window.currentUserId) {
        return window.currentUserId;
    }
    
    // 尝试从localStorage中的token解析用户ID
    try {
        const token = localStorage.getItem('token');
        if (token) {
            const payload = JSON.parse(atob(token.split('.')[1]));
            return payload.user_id || payload.sub || null;
        }
    } catch (e) {
        console.log('无法从token解析用户ID:', e);
    }
    
    return null;
}

// 判断用户是否可以编辑题库
function canEditBank(bank) {
    if (bank.is_official) {
        return false; // 官方题库不能编辑
    }
    
    const currentUserId = getCurrentUserId();
    if (!currentUserId) {
        return false;
    }
    
    // 用户可以编辑自己创建的题库（包括Fork的题库）
    return bank.created_by === currentUserId;
}
