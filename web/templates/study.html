{{template "base.html" .}}

{{define "study-content"}}
<style>
.cf-grey   { background: #808080 !important; color: #fff !important; }
.cf-green  { background: #008000 !important; color: #fff !important; }
.cf-cyan   { background: #03a89e !important; color: #fff !important; }
.cf-blue   { background: #0000ff !important; color: #fff !important; }
.cf-violet { background: #aa00aa !important; color: #fff !important; }
.cf-orange { background: #ff8c00 !important; color: #fff !important; }
.cf-red    { background: #ff0000 !important; color: #fff !important; }
.cf-gold   { background: #ffd700 !important; color: #fff !important; }
</style>
<div class="row">
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="mb-1">
                    <i class="fas fa-brain text-primary"></i> 开始学习
                </h2>
                <p class="text-muted mb-0" id="studyPlanInfo">正在加载学习计划信息...</p>
            </div>
            <div>
                <a href="/study-plans" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left"></i> 返回学习计划
                </a>
            </div>
        </div>
    </div>
</div>

<!-- 学习进度概览 -->
<div class="row mb-4">
    <div class="col-12">
        <div class="card">
            <div class="card-body">
                <div class="row" id="progressOverview">
                    <div class="col-12 text-center">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">加载中...</span>
                        </div>
                        <p class="mt-2 text-muted">正在加载进度信息...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 今日学习任务 -->
<div class="row mb-4">
    <div class="col-12">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">
                    <i class="fas fa-tasks"></i> 今日学习任务
                </h5>
            </div>
            <div class="card-body" id="dailyTasks">
                <div class="text-center py-4">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">加载中...</span>
                    </div>
                    <p class="mt-2 text-muted">正在加载今日任务...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 学习统计 -->
<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h6 class="mb-0">
                    <i class="fas fa-chart-line"></i> 学习统计
                </h6>
            </div>
            <div class="card-body" id="studyStats">
                <div class="text-center py-3">
                    <div class="spinner-border spinner-border-sm text-primary" role="status">
                        <span class="visually-hidden">加载中...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h6 class="mb-0">
                    <i class="fas fa-lightbulb"></i> 学习建议
                </h6>
            </div>
            <div class="card-body">
                <div class="alert alert-info mb-0">
                    <h6 class="alert-heading">
                        <i class="fas fa-brain"></i> 遗忘曲线学习法
                    </h6>
                    <ul class="mb-0 small">
                        <li>坚持每日学习，保持学习节奏</li>
                        <li>及时复习到期的题目，巩固记忆</li>
                        <li>对于掌握的题目，系统会自动调整复习间隔</li>
                        <li>遇到困难题目时，可以标记为未掌握重新学习</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 学习页面脚本 -->
<script>
let studyPlanId = null;
let studyPlan = null;
let dailyQuestions = [];
let currentQuestionIndex = 0;
let startIndex = 0; // 新增：记录开始学习的位置

// 页面加载时获取学习计划ID
document.addEventListener('DOMContentLoaded', function() {
    const urlParams = new URLSearchParams(window.location.search);
    studyPlanId = urlParams.get('plan');
    
    if (!studyPlanId) {
        showAlert('缺少学习计划参数', 'danger');
        setTimeout(() => { window.location.href = '/study-plans'; }, 2000);
        return;
    }
    
    // 等待axios设置好
    setTimeout(() => {
        loadStudyData();
    }, 200);
});

// 加载所有初始学习数据
async function loadStudyData() {
    try {
        const [planResponse, questionsResponse] = await Promise.all([
            axios.get(`/api/study-plan/${studyPlanId}`),
            axios.get(`/api/study-plan/${studyPlanId}/daily-questions`)
        ]);
        
        studyPlan = planResponse.data;
        
        // 适配新的响应格式
        const questionsData = questionsResponse.data;
        dailyQuestions = questionsData.questions || [];
        startIndex = questionsData.start || 0;
        
        renderStudyPlanInfo();
        await reloadProgress(); // 加载并渲染初始进度
        renderDailyTasks();
        
    } catch (error) {
        console.error('加载学习数据失败:', error);
        showAlert('加载学习数据失败: ' + (error.response?.data?.error || error.message), 'danger');
    }
}

// 重新加载并渲染进度和统计
async function reloadProgress() {
    try {
        const progressResponse = await axios.get(`/api/study-plan/${studyPlanId}/progress`);
        const progress = progressResponse.data;
        renderProgressOverview(progress);
        renderStudyStats(progress);
    } catch (error) {
        console.error('刷新进度失败:', error);
    }
}

// 渲染学习计划信息
function renderStudyPlanInfo() {
    document.getElementById('studyPlanInfo').textContent = 
        `${studyPlan.question_bank.name} - 每日学习 ${studyPlan.daily_count} 题`;
}

// 渲染进度概览
function renderProgressOverview(progress) {
    const html = `
        <div class="col-md-3 text-center"><div class="border-end"><h4 class="text-primary mb-1">${progress.total_questions}</h4><small class="text-muted">总题数</small></div></div>
        <div class="col-md-3 text-center"><div class="border-end"><h4 class="text-info mb-1">${progress.studied_count}</h4><small class="text-muted">已学习</small></div></div>
        <div class="col-md-3 text-center"><div class="border-end"><h4 class="text-success mb-1">${progress.completed_count}</h4><small class="text-muted">已掌握</small></div></div>
        <div class="col-md-3 text-center"><h4 class="text-warning mb-1">${progress.review_count}</h4><small class="text-muted">待复习</small></div>
    `;
    document.getElementById('progressOverview').innerHTML = html;
}

// 渲染每日任务区域
function renderDailyTasks() {
    if (!dailyQuestions || dailyQuestions.length === 0) {
        document.getElementById('dailyTasks').innerHTML = `
            <div class="text-center py-4">
                <i class="fas fa-check-circle fa-3x text-success mb-3"></i>
                <h5 class="text-success">今日任务已完成！</h5>
                <p class="text-muted">你已经完成了今天的学习任务，明天再来吧！</p>
                <a href="/study-plans" class="btn btn-primary"><i class="fas fa-arrow-left"></i> 返回学习计划</a>
            </div>`;
    } else {
        // 从断点位置开始学习
        currentQuestionIndex = startIndex;
        
        // 如果已经全部完成，显示完成信息
        if (startIndex >= dailyQuestions.length) {
            document.getElementById('dailyTasks').innerHTML = `
                <div class="text-center py-4">
                    <i class="fas fa-trophy fa-3x text-warning mb-3"></i>
                    <h5 class="text-success">太棒了，今日任务全部完成！</h5>
                    <p class="text-muted">你的努力终将有所回报，明天继续加油！</p>
                    <a href="/study-plans" class="btn btn-primary mt-3"><i class="fas fa-arrow-left"></i> 返回学习计划</a>
                </div>`;
        } else {
            // 显示断点续学提示（如果不是从头开始）
            if (startIndex > 0) {
                showContinueStudyMessage();
            }
            showCurrentQuestion(currentQuestionIndex);
        }
    }
}

// 显示断点续学提示
function showContinueStudyMessage() {
    const message = `欢迎回来！你今天已经学习了 ${startIndex} 道题，现在从第 ${startIndex + 1} 题继续学习。`;
    showAlert(message, 'info');
}

// 渲染学习统计
function renderStudyStats(progress) {
    const progressRate = progress.progress_rate || 0;
    const masteryRate = progress.mastery_rate || 0;
    
    const html = `
        <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center mb-1"><small class="text-muted">学习进度</small><small class="text-primary">${progressRate}%</small></div>
            <div class="progress" style="height: 8px;"><div class="progress-bar bg-primary" style="width: ${progressRate}%"></div></div>
        </div>
        <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center mb-1"><small class="text-muted">掌握率</small><small class="text-success">${masteryRate}%</small></div>
            <div class="progress" style="height: 8px;"><div class="progress-bar bg-success" style="width: ${masteryRate}%"></div></div>
        </div>
        <div class="text-center"><small class="text-muted">继续努力，你已经学习了 ${progress.studied_count} 道题！</small></div>
    `;
    document.getElementById('studyStats').innerHTML = html;
}

function getScoreClass(score) {
    if (score == null) return 'cf-grey';
    if (score < 1200) return 'cf-grey';
    if (score < 1400) return 'cf-green';
    if (score < 1600) return 'cf-cyan';
    if (score < 1900) return 'cf-blue';
    if (score < 2100) return 'cf-violet';
    if (score < 2400) return 'cf-orange';
    if (score < 3000) return 'cf-red';
    return 'cf-gold';
}
function getDifficultyClass(difficulty) {
    switch((difficulty||'').toLowerCase()) {
        case 'easy': return 'bg-success';
        case 'medium': return 'bg-warning';
        case 'hard': return 'bg-danger';
        default: return 'bg-secondary';
    }
}
function renderQuestionTag(q) {
    if (q.score !== undefined && q.score !== null && q.score !== '' && !isNaN(Number(q.score))) {
        return `<span class="badge ${getScoreClass(Number(q.score))}">${q.score}</span>`;
    } else if (q.difficulty) {
        return `<span class="badge ${getDifficultyClass(q.difficulty)}">${q.difficulty}</span>`;
    } else {
        return `<span class="badge bg-secondary">未知</span>`;
    }
}
// 修改 showCurrentQuestion
function showCurrentQuestion(index) {
    if (index >= dailyQuestions.length) {
        document.getElementById('dailyTasks').innerHTML = `
            <div class="text-center py-4">
                <i class="fas fa-trophy fa-3x text-warning mb-3"></i>
                <h5 class="text-success">太棒了，今日任务全部完成！</h5>
                <p class="text-muted">你的努力终将有所回报，明天继续加油！</p>
                <a href="/study-plans" class="btn btn-primary mt-3"><i class="fas fa-arrow-left"></i> 返回学习计划</a>
            </div>`;
        return;
    }
    currentQuestionIndex = index;
    const item = dailyQuestions[index];
    const question = item.question;
    const isReview = item.is_review;
    const actualIndex = index + 1;
    const totalQuestions = dailyQuestions.length;
    const overallProgress = ((index + 1) / totalQuestions) * 100;
    let html = `
        <div class="text-center">
            <p class="text-muted mb-2">第 ${actualIndex} 题 / 共 ${totalQuestions} 题
                ${isReview ? '<span class="badge bg-warning ms-2">复习</span>' : '<span class="badge bg-info ms-2">新题</span>'}
            </p>
            <div class="progress mb-4" style="height: 4px;">
                <div class="progress-bar" style="width: ${overallProgress}%" role="progressbar"></div>
            </div>
        </div>
        <div class="card shadow-sm p-4 text-center" style="min-height: 250px;">
            <div class="mb-3">${renderQuestionTag(question)}</div>
            <h3 class="mb-4">${question.title}</h3>
            <div class="mb-4">`;
    if (question.url) {
        html += `<a href="${question.url}" target="_blank" rel="noopener" class="btn btn-outline-primary btn-sm ms-2">查看题目链接</a>`;
    }
    html += `</div>
            <div class="alert alert-light border small">
                <i class="fas fa-lightbulb text-warning"></i> <strong>学习提示:</strong> 请先尝试独立思考和解决这道题目，然后根据你的完成情况选择下面的选项。
            </div>
        </div>
        <div class="mt-4 text-center">
            <div class="row">
                <div class="col-6">
                    <button class="btn btn-lg btn-success w-100" onclick="completeQuestion(${question.id}, 'ac')">
                        <i class="fas fa-check-circle"></i> 独立 AC
                        <span class="d-block small text-white-50">我能够独立完成这道题</span>
                    </button>
                </div>
                <div class="col-6">
                     <button class="btn btn-lg btn-danger w-100" onclick="completeQuestion(${question.id}, 'failed')">
                        <i class="fas fa-times-circle"></i> 未掌握
                         <span class="d-block small text-white-50">需要再次学习这道题</span>
                    </button>
                </div>
            </div>
        </div>`;
    document.getElementById('dailyTasks').innerHTML = html;
}

// 完成题目处理
async function completeQuestion(questionId, resultType) {
    try {
        const response = await axios.post(`/api/user-question/${questionId}/complete`, {
            result_type: resultType
        });
        showAlert(response.data.message, 'success');
        
        await reloadProgress(); // 刷新进度
        showCurrentQuestion(currentQuestionIndex + 1); // 显示下一题
        
    } catch (error) {
        console.error('完成题目失败:', error);
        showAlert('操作失败: ' + (error.response?.data?.error || error.message), 'danger');
    }
}

// 显示提示信息
function showAlert(message, type = 'info') {
    const alertContainer = document.getElementById('alert-container') || document.body;
    const alertDiv = document.createElement('div');
    alertDiv.className = `alert alert-${type} alert-dismissible fade show position-fixed`;
    alertDiv.style.top = '20px';
    alertDiv.style.right = '20px';
    alertDiv.style.zIndex = '1050';
    alertDiv.setAttribute('role', 'alert');
    alertDiv.innerHTML = `${message}<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>`;
    
    alertContainer.appendChild(alertDiv);
    
    setTimeout(() => {
        const alertInstance = bootstrap.Alert.getOrCreateInstance(alertDiv);
        if(alertInstance) {
            alertInstance.close();
        }
    }, 4000);
}

function getDifficultyColor(difficulty) {
    switch(difficulty) {
        case 'Easy': return 'success';
        case 'Medium': return 'warning';
        case 'Hard': return 'danger';
        default: return 'secondary';
    }
}
</script>
{{end}}
